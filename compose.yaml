# =============================================================================
# compose.yaml — Orquestacion de servicios para Lab 5: Data Warehouse y Dashboard
#
# Define los cuatro contenedores del pipeline end-to-end:
#   1. postgres_server  — Base de datos transaccional OLTP (retail_db)
#   2. jupyter          — Orquestacion ETL y transformacion de datos
#   3. clickhouse_server — Data Warehouse columnar OLAP (analytics)
#   4. superset         — Plataforma de visualizacion y dashboards BI
#
# Los volumenes nombrados garantizan persistencia de datos entre reinicios.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # postgres_server
  # Contenedor de la base de datos transaccional retail_db. Construye la imagen
  # desde el Dockerfile local que copia e inicializa el esquema y los datos.
  # El healthcheck verifica que el servidor este listo antes de que los servicios
  # dependientes intenten conectarse.
  # ---------------------------------------------------------------------------
  postgres_server:
    build: ./postgresql
    container_name: postgres_server
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab_user -d retail_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # jupyter
  # Contenedor de Jupyter Notebook basado en la imagen scipy-notebook.
  # Monta el directorio local notebooks/ como volumen para que los cambios
  # en los archivos .ipynb sean persistentes en el host.
  # Instala las dependencias definidas en requirements.txt antes de arrancar
  # el servidor de notebooks.
  # ---------------------------------------------------------------------------
  jupyter:
    image: jupyter/scipy-notebook:python-3.10
    container_name: lab_jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
    environment:
      JUPYTER_TOKEN: lab5
    depends_on:
      - postgres_server
    command: >
      bash -c "pip install -r /home/jovyan/work/requirements.txt && start-notebook.sh"

  # ---------------------------------------------------------------------------
  # clickhouse_server
  # Contenedor del motor columnar ClickHouse para la capa OLAP.
  # Expone el puerto HTTP (8123) para conexiones desde Jupyter y Superset,
  # y el puerto nativo (9000) para herramientas como DBeaver.
  # Los archivos de configuracion de usuarios se montan desde clickhouse/config/
  # y el esquema inicial desde clickhouse/init/.
  # ---------------------------------------------------------------------------
  clickhouse_server:
    image: clickhouse/clickhouse-server:24.8
    container_name: clickhouse_server
    restart: always
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/config:/etc/clickhouse-server/users.d
      - ./clickhouse/init:/docker-entrypoint-initdb.d
    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_USER: admin
      CLICKHOUSE_PASSWORD: admin123
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1

  # ---------------------------------------------------------------------------
  # superset
  # Contenedor de Apache Superset para la capa de visualizacion y dashboards.
  # Construye la imagen desde el Dockerfile local que instala el conector de
  # ClickHouse. El script superset_init.sh inicializa la base de metadatos,
  # crea el usuario administrador y registra la conexion a ClickHouse.
  # ---------------------------------------------------------------------------
  superset:
    build: ./superset
    container_name: superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: supersecretkey
    depends_on:
      - clickhouse_server
      - postgres_server
    volumes:
      - superset_home:/app/superset_home
    command: ["/app/superset_init.sh"]

volumes:
  postgres_data:
  clickhouse_data:
  superset_home: